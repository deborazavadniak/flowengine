name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test Java 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Compilar projeto
        run: mvn compile -q

      - name: Executar testes
        run: mvn test

      - name: Publicar relatorio de testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados dos Testes
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Gerar JAR
        run: mvn package -DskipTests -q

      - name: Salvar JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: flowengine-jar
          path: target/flowengine-*.jar
          retention-days: 7